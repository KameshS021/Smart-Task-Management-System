
replicaCount: 1

image:
  repository: 192.168.1.16/smart-task-management-system/report-service
  tag: v1
  pullPolicy: Always

imagePullSecrets: []

service:
  type: ClusterIP
  port: 5004
  targetPort: 5004

containerPort: 5004

resources: {}

env:
  PORT: "5004"
  JWT_SECRET: "mysecretkey"
  MONGO_URI: "mongodb://mongodb:27017/taskdb"

ingress:
  enabled: true
  className: nginx

  host: report.smarttask.local

  path: /

  pathType: Prefix
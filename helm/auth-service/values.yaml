replicaCount: 1

image:
  repository: 192.168.1.16/smart-task-management-system/auth-service
  tag: v1
  pullPolicy: Always

imagePullSecrets: []

service:
  type: ClusterIP
  port: 5001
  targetPort: 5001

containerPort: 5001

resources: {}

env:
  PORT: "5001"
  JWT_SECRET: "mysecretkey"
  MONGO_URI: "mongodb://mongodb:27017/taskdb"

ingress:
  enabled: true
  className: nginx

  host: auth.smarttask.local

  path: /

  pathType: Prefix
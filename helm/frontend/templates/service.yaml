apiVersion: v1
kind: Service

metadata:
  name: {{ include "frontend.fullname" . }}

spec:
  type: {{ .Values.service.type }}

  selector:
    {{- include "frontend.selectorLabels" . | nindent 4 }}

  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    protocol: TCP
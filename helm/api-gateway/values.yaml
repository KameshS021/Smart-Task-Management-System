replicaCount: 1

image:
  repository: 192.168.1.16/smart-task-management-system/api-gateway
  tag: v1
  pullPolicy: Always

imagePullSecrets: []

service:
  type: ClusterIP
  port: 5000
  targetPort: 5000

containerPort: 5000

resources: {}

env:
  PORT: "5000"
  JWT_SECRET: "mysecretkey"
  MONGO_URI: "mongodb://mongodb:27017/taskdb"

ingress:
  enabled: true
  className: nginx

  host: api.smarttask.local

  path: /

  pathType: Prefix

  tls: false